description = "Review changes for over-engineering, what can be deleted"
prompt = "Review the current code changes for over-engineering only, not correctness. One line per finding: L<line>: <tag> <what to cut>. <replacement>. Tags: delete (dead code/speculative feature), stdlib (reinvented standard library), native (dependency doing what the platform does), yagni (abstraction with one implementation), shrink (same logic, fewer lines). Pre-filter: flag moment/lodash/axios imports, JSON.parse(JSON.stringify(...)), new Date().toISOString(), trivial getter/setter classes, and pass-through wrappers. End with the net lines removable. If nothing to cut: 'Lean already. Ship.'"
